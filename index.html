<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Evolution</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    <div id="dev-mode-status" class="dev-status">DEV MODE: ACTIVE (+500/click)</div>

    <div class="game-container">
        <aside class="side-panel left">
            <div class="stat-box">
                <h2 id="resource-name">Planet Resources</h2>
                <p id="resource-display">0 💧</p>
                <small>Income: <span id="pps-display">0</span>/s</small>
            </div>
            
            <div class="stat-box">
                <h3>Epoch: <span id="epoch-display">1</span></h3>
                <p id="epoch-name" style="font-size: 0.9rem; color: #aaa;">Barren Rock</p>
                <div class="progress-bar-container">
                    <div id="progress-bar-fill" class="progress-bar-fill"></div>
                </div>
                <p id="next-stage-info" style="font-size: 0.75rem; margin-top: 5px;"></p>
            </div>

            <div class="stat-box event-log">
                <h4>System Log:</h4>
                <div id="event-display">Waiting for events...</div>
            </div>

            <button id="reset-btn" class="danger-btn">Reset Progress</button>
        </aside>

        <main class="main-display">
            <div id="evolution-container">
                <button id="evolve-btn" class="evolve-btn">EVOLVE PLANET</button>
            </div>
            <div id="planet-click-zone">
                <div id="planet" class="planet level-1">
                    <div class="land-mass"></div>
                    <div class="life-forms"></div> </div>
            </div>
        </main>

        <aside class="side-panel right">
            <h3>Infrastructure</h3>
            <div id="buildings-list"></div>
        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
